version: "3.9"

services:

  db:

    image: postgres:17

    container_name: mogadpally_db

    restart: always

    environment:

      POSTGRES_DB: mogadpally

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: password

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data


  web:

    build: .

    container_name: mogadpally_backend

    command: python manage.py runserver 0.0.0.0:8000

    volumes:

      - .:/app

    ports:

      - "8000:8000"

    depends_on:

      - db

    env_file:

      - .env


volumes:

  postgres_data: